<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebForm Vertical - Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Fondo con overlay oscuro para resaltar el formulario */
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('./assets/img/fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        /* Efecto de vidrio (Glassmorphism) */
        .glass {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-white font-sans">

    <nav class="w-full p-6 flex justify-between items-center max-w-7xl mx-auto">
        <div class="flex items-center gap-2 text-cyan-400 font-bold text-xl">
            <i data-lucide="code-2"></i> WEBFORM
        </div>
        <div class="hidden md:flex gap-6 text-sm font-medium">
            <a href="#" class="hover:text-cyan-400 transition">Inicio</a>
            <a href="#" class="hover:text-cyan-400 transition">Servicios</a>
            <a href="#" class="hover:text-cyan-400 transition">Nosotros</a>
            <a href="#" class="border-b-2 border-white pb-1">Contacto</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="glass w-full max-w-sm rounded-[40px] p-8 md:p-10 shadow-2xl">
            <header class="text-center mb-8">
                <h1 class="text-3xl font-bold leading-tight mb-2">Contáctanos y Regístrate</h1>
                <p class="text-gray-300 text-sm">Déjanos tus datos y nos comunicaremos contigo pronto.</p>
            </header>

            <form class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-1">
                        <label class="block text-xs font-semibold mb-1 ml-1">Nombre Completo</label>
                        <div class="relative group">
                            <i data-lucide="user" class="absolute left-3 top-3 w-4 h-4 text-gray-400 group-focus-within:text-cyan-400"></i>
                            <input type="text" placeholder="Ej. Ana" class="w-full bg-white text-gray-800 pl-9 py-2.5 rounded-xl text-sm outline-none">
                        </div>
                    </div>
                    <div class="col-span-1">
                        <label class="block text-xs font-semibold mb-1 ml-1">Correo Electrónico</label>
                        <div class="relative group">
                            <i data-lucide="mail" class="absolute left-3 top-3 w-4 h-4 text-gray-400 group-focus-within:text-cyan-400"></i>
                            <input type="email" placeholder="Ej. correo" class="w-full bg-white text-gray-800 pl-9 py-2.5 rounded-xl text-sm outline-none">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-1">
                        <label class="block text-xs font-semibold mb-1 ml-1">Número de Teléfono</label>
                        <div class="relative group">
                            <i data-lucide="phone" class="absolute left-3 top-3 w-4 h-4 text-gray-400 group-focus-within:text-cyan-400"></i>
                            <input type="tel" placeholder="+52" class="w-full bg-white text-gray-800 pl-9 py-2.5 rounded-xl text-sm outline-none">
                        </div>
                    </div>
                    <div class="col-span-1">
                        <label class="block text-xs font-semibold mb-1 ml-1">Asunto</label>
                        <div class="relative group">
                            <i data-lucide="help-circle" class="absolute left-3 top-3 w-4 h-4 text-gray-400 group-focus-within:text-cyan-400"></i>
                            <input type="text" placeholder="Duda" class="w-full bg-white text-gray-800 pl-9 py-2.5 rounded-xl text-sm outline-none">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold mb-1 ml-1">Mensaje</label>
                    <div class="relative group">
                        <i data-lucide="edit-3" class="absolute left-3 top-3 w-4 h-4 text-gray-400 group-focus-within:text-cyan-400"></i>
                        <textarea rows="3" placeholder="Escribe tu mensaje aquí..." class="w-full bg-white text-gray-800 pl-9 py-2.5 rounded-xl text-sm outline-none resize-none"></textarea>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-full font-bold shadow-lg hover:shadow-blue-500/40 transition-all flex items-center justify-center gap-2 group">
                    Enviar Información 
                    <i data-lucide="chevron-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>
        </div>
    </main>

    <footer class="w-full py-6 glass mt-auto">
        <div class="max-w-7xl mx-auto px-10 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-sm">
                <p class="font-bold">Programador</p>
                <p class="text-gray-300">Estudiante de Sistemas - TecNM Pachuca</p>
            </div>
            
            <a href="https://jairops1272.github.io/WebDesign_Fav/" target="_blank" class="hover:scale-110 transition-transform">
                <i data-lucide="github" class="w-10 h-10"></i>
            </a>

            <div class="text-right text-xs text-gray-400">
                <p>© 2026 Diseñado por Jairo</p>
                <p>Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
