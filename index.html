<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - WebForm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-transparent py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fa-solid fa-code text-info me-2"></i>WEBFORM
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-3">
                    <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold border border-info rounded-pill px-3" href="#">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="form-card text-center p-5 mx-3">
            <h2 class="fw-bold mb-1">Contáctanos y Regístrate</h2>
            <p class="text-muted mb-4">Déjanos tus datos y nos comunicaremos contigo pronto.</p>

            <form>
                <div class="row g-3">
                    <div class="col-md-6 text-start">
                        <label class="form-label fw-semibold">Nombre Completo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fa-regular fa-user text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" placeholder="Ej. Ana Pérez García">
                        </div>
                    </div>
                    <div class="col-md-6 text-start">
                        <label class="form-label fw-semibold">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fa-regular fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0" placeholder="correo@ejemplo.com">
                        </div>
                    </div>
                    <div class="col-md-6 text-start">
                        <label class="form-label fw-semibold">Número de Teléfono</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-phone text-muted"></i></span>
                            <input type="tel" class="form-control border-start-0" placeholder="+52 771 123 4567">
                        </div>
                    </div>
                    <div class="col-md-6 text-start">
                        <label class="form-label fw-semibold">Asunto</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fa-regular fa-comment-dots text-muted"></i></span>
                            <select class="form-select border-start-0">
                                <option selected disabled>Selecciona el motivo</option>
                                <option>Información</option>
                                <option>Soporte</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-12 text-start">
                        <label class="form-label fw-semibold">Mensaje</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 align-items-start pt-2"><i class="fa-solid fa-pen text-muted"></i></span>
                            <textarea class="form-control border-start-0" rows="3" placeholder="Escribe tu mensaje aquí..."></textarea>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn submit-button mt-4 px-5 py-2 w-100">
                    Enviar Información <i class="fa-solid fa-arrow-right ms-2"></i>
                </button>
            </form>
        </div>
    </main>

    <footer class="footer-glass mt-auto py-4">
        <div class="container text-center">
            <div class="row align-items-center">
                <div class="col-md-4 text-md-start mb-3 mb-md-0">
                    <h5 class="fw-bold text-white mb-0">Programador</h5>
                    <p class="text-light-50 small mb-0">Estudiante de Sistemas - TecNM Pachuca</p>
                </div>
                <div class="col-md-4 mb-3 mb-md-0">
                    <div class="d-flex justify-content-center">
                        <a href="https://github.com/TU_USUARIO" target="_blank" class="github-link" title="Ver mi GitHub">
                            <i class="fa-brands fa-github"></i>
                        </a>
                    </div>
                </div>
                <div class="col-md-4 text-md-end">
                    <p class="text-light small mb-0">© 2026 Diseñado por Jairo</p>
                    <p class="text-light-50 x-small">Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
